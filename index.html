<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#f97316" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Saída Velozz" />
  <title>Saída Flex Velozz</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="src/css/style.css" />
</head>

<body>
  <div id="loginOverlay" class="overlay">
    <h2 style="text-align: center; color: var(--accent); margin-bottom: 20px">SAÍDA FLEX VELOZZ</h2>
    <div class="card">
      <div class="selfie-box" onclick="document.getElementById('inputSelfie').click()">
        <img id="previewSelfie" src="" style="display: none" />
        <span id="selfiePlaceholder" style="font-size: 12px; font-weight: bold">📸 TIRAR SELFIE*</span>
      </div>
      <input type="file" id="inputSelfie" accept="image/*" capture="user" class="hidden" />

      <label style="font-size: 12px; color: #6b7280; text-transform: uppercase">Operador:</label>
      <select id="selOperator"></select>

      <label style="font-size: 12px; color: #6b7280; text-transform: uppercase">Entregador:</label>
      <select id="selDriver"></select>

      <label
        style="font-size: 12px; color: var(--accent); font-weight: bold; text-transform: uppercase; margin-top: 10px; display: block;">📦
        Expectativa por marketplace:</label>
      <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px">
        <div>
          <label style="font-size: 11px; color: #ffe600; font-weight: bold; text-transform: uppercase">ML</label>
          <input type="number" id="inputExpML" placeholder="0" min="0"
            style="text-align: center; font-size: 20px; font-weight: bold; color: #ffe600; background: #000; border: 1px solid #333; width: 100%; border-radius: 8px;" />
        </div>
        <div>
          <label style="font-size: 11px; color: #ee4d2d; font-weight: bold; text-transform: uppercase">Shopee</label>
          <input type="number" id="inputExpShopee" placeholder="0" min="0"
            style="text-align: center; font-size: 20px; font-weight: bold; color: #ee4d2d; background: #000; border: 1px solid #333; width: 100%; border-radius: 8px;" />
        </div>
        <div>
          <label style="font-size: 11px; color: #94a3b8; font-weight: bold; text-transform: uppercase">Avulso</label>
          <input type="number" id="inputExpAvulso" placeholder="0" min="0"
            style="text-align: center; font-size: 20px; font-weight: bold; color: #94a3b8; background: #000; border: 1px solid #333; width: 100%; border-radius: 8px;" />
        </div>
      </div>

      <button class="btn btn-pr" id="btnStart" style="margin-top: 15px" onclick="app.session.start()">▶ INICIAR
        CONFERÊNCIA</button>

      <div style="text-align: center; margin-top: 40px; padding-bottom: 10px;">
        <button id="btnOpenAdmin"
          style="background: none; border: none; font-size: 32px; opacity: 0.6; cursor: pointer;">⚙️</button>
      </div>
    </div>
  </div>

  <div id="mainApp" class="hidden" style="height: 100vh; display: flex; flex-direction: column">
    <div class="tabs-header">
      <div class="tab-link active" onclick="app.ui.goToTab(0)">📷 Scanner</div>
      <div class="tab-link" onclick="app.ui.goToTab(1)">📋 Histórico</div>
      <div class="tab-link" onclick="app.ui.goToTab(2)">🖼️ Fotos</div>
      <div class="tab-link" onclick="app.ui.goToTab(3)">📤 Exportar</div>
    </div>
    <div id="swipeContainer" style="padding: 0 10px; flex: 1; overflow-y: auto;">
      <div class="page active" id="page-0">
        <div class="card"
          style="display: flex; justify-content: space-between; align-items: center; padding: 10px; margin-bottom: 10px;">
          <div>
            <h3 id="displayDriver" style="color: var(--accent); margin: 0">Entregador</h3>
            <small id="displayOperator" style="color: #6b7280; font-family: 'Space Mono'">Operador</small>
          </div>
          <button class="btn"
            style="width: auto; padding: 5px 15px; background: var(--surface); border: 1px solid var(--danger); color: var(--danger);"
            onclick="app.session.reset(true)">CANCELAR</button>
        </div>
        <div class="stats-grid">
          <div class="stat-item ml" id="box-ml">ML<br /><b id="countML" style="font-size: 22px; color: #ffe600">0</b>
          </div>
          <div class="stat-item shopee" id="box-shopee">SHOPEE<br /><b id="countShopee"
              style="font-size: 22px; color: #ee4d2d">0</b></div>
          <div class="stat-item avulso" id="box-avulso">AVULSO<br /><b id="countAvulso"
              style="font-size: 22px; color: #94a3b8">0</b></div>
        </div>
        <div class="cam-container" id="camContainer">
          <video id="camVideo" autoplay playsinline muted></video>
          <div class="scanner-laser"></div>
          <canvas id="qrCanvas" class="hidden"></canvas>
        </div>
        <button class="btn btn-sec" style="margin-top: 20px" onclick="app.ui.nextTab()">PRÓXIMO ➔</button>
      </div>
      <div class="page" id="page-1">
        <div id="historyList" class="history-list"></div><button class="btn btn-sec" onclick="app.ui.nextTab()">PRÓXIMO
          ➔</button>
      </div>
      <div class="page" id="page-2">
        <div class="photos-grid" id="photosGrid"></div><button class="btn btn-sec"
          onclick="document.getElementById('inputPhoto').click()">📸 ADICIONAR FOTO</button><input type="file"
          id="inputPhoto" accept="image/*" capture="environment" multiple class="hidden" /><button class="btn btn-sec"
          onclick="app.ui.nextTab()">PRÓXIMO ➔</button>
      </div>
      <div class="page" id="page-3">
        <div id="exportSummary" class="summary-box"></div><button class="btn btn-wa"
          onclick="app.export.toWhatsApp()">📲 COMPARTILHAR E FINALIZAR</button>
      </div>
    </div>
  </div>

  <div id="adminOverlay" class="overlay hidden" style="z-index: 2000;">
    <h2 style="text-align: center; color: var(--accent); margin-bottom: 20px">ADMINISTRAÇÃO</h2>
    <div id="adminLoginCard" class="card" style="text-align: center;">
      <h3>Acesso Restrito</h3>
      <input type="password" id="adminPin" placeholder="PIN"
        style="width: 100%; padding: 15px; background: #000; border: 1px solid #333; color: #fff; text-align: center; font-size: 20px; border-radius: 8px; margin: 15px 0;">
      <button id="btnVerifyPin" class="btn btn-pr" style="width: 100%; margin-bottom: 10px;">🔓 ENTRAR</button>
      <button class="btn btn-danger" style="width: 100%;"
        onclick="document.getElementById('adminOverlay').classList.add('hidden')">❌ CANCELAR</button>
    </div>
    <div id="adminPanelCard" class="card hidden">
      <h3>Operadores</h3>
      <div style="display: flex; gap: 10px; margin-bottom: 15px;">
        <input type="text" id="newOperatorName" placeholder="Nome"
          style="flex: 1; padding: 10px; background: #000; color: #fff; border-radius: 8px; border: 1px solid #333;">
        <button id="btnAddOperator" class="btn btn-pr">+</button>
      </div>
      <ul id="listOperators" style="list-style: none; margin-bottom: 20px; max-height: 150px; overflow-y: auto;"></ul>
      <h3>Entregadores</h3>
      <div style="display: flex; gap: 10px; margin-bottom: 15px;">
        <input type="text" id="newDriverName" placeholder="Nome"
          style="flex: 1; padding: 10px; background: #000; color: #fff; border-radius: 8px; border: 1px solid #333;">
        <button id="btnAddDriver" class="btn btn-pr">+</button>
      </div>
      <ul id="listDrivers" style="list-style: none; margin-bottom: 20px; max-height: 150px; overflow-y: auto;"></ul>
      <button id="btnSyncAdmin" class="btn btn-pr"
        style="width: 100%; background: var(--success); margin-bottom: 10px;">🔄 SINCRONIZAR SHEETS</button>
      <button class="btn btn-danger" style="width: 100%;"
        onclick="document.getElementById('adminOverlay').classList.add('hidden')">FECHAR</button>
    </div>
  </div>

  <canvas id="collageCanvas" style="display: none"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script src="src/config.js"></script>
  <script src="src/js/ui.js"></script>
  <script src="src/js/registry.js"></script>
  <script src="src/js/session.js"></script>
  <script src="src/js/scanner.js"></script>
  <script src="src/js/collage.js"></script>
  <script src="src/js/audio.js"></script>
  <script src="src/js/export.js"></script>
  <script src="src/js/admin.js"></script>
  <script src="src/js/main.js"></script>
</body>

</html>
