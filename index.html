<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#f97316" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Saída Velozz" />
  <title>Saída Flex Velozz</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="src/css/style.css" />
</head>

<body>
  <div id="adminOverlay" class="overlay hidden" style="z-index: 2000;">
    <h2 style="text-align: center; color: var(--accent); margin-bottom: 20px">ADMINISTRAÇÃO</h2>
    <div id="adminLoginCard" class="card" style="text-align: center;">
      <h3>Acesso Restrito</h3>
      <input type="password" id="adminPin" placeholder="PIN"
        style="width: 100%; padding: 15px; background: #000; border: 1px solid #333; color: #fff; text-align: center; font-size: 20px; border-radius: 8px; margin: 15px 0;">
      <button id="btnVerifyPin" class="btn btn-pr" style="width: 100%; margin-bottom: 10px;">🔓 ENTRAR</button>
      <button class="btn btn-danger" style="width: 100%;"
        onclick="document.getElementById('adminOverlay').classList.add('hidden')">❌ CANCELAR</button>
    </div>
    <div id="adminPanelCard" class="card hidden">
      <h3>Operadores</h3>
      <div style="display: flex; gap: 10px; margin-bottom: 15px;">
        <input type="text" id="newOperatorName" placeholder="Nome"
          style="flex: 1; padding: 10px; background: #000; color: #fff; border-radius: 8px;">
        <button id="btnAddOperator" class="btn btn-pr">+</button>
      </div>
      <ul id="listOperators" style="list-style: none; margin-bottom: 20px; max-height: 150px; overflow-y: auto;"></ul>
      <h3>Entregadores</h3>
      <div style="display: flex; gap: 10px; margin-bottom: 15px;">
        <input type="text" id="newDriverName" placeholder="Nome"
          style="flex: 1; padding: 10px; background: #000; color: #fff; border-radius: 8px;">
        <button id="btnAddDriver" class="btn btn-pr">+</button>
      </div>
      <ul id="listDrivers" style="list-style: none; margin-bottom: 20px; max-height: 150px; overflow-y: auto;"></ul>
      <button id="btnSyncAdmin" class="btn btn-pr"
        style="width: 100%; background: var(--success); margin-bottom: 10px;">🔄 SINCRONIZAR SHEETS</button>
      <button class="btn btn-danger" style="width: 100%;"
        onclick="document.getElementById('adminOverlay').classList.add('hidden')">FECHAR</button>
    </div>
  </div>

  <button id="btnOpenAdmin"
    style="position: fixed; bottom: 10px; right: 10px; background: none; border: none; font-size: 24px; opacity: 0.5; z-index: 999; cursor: pointer;">⚙️</button>

  <div class="beep-ind" id="beepEl"></div>
  <canvas id="collageCanvas" style="display: none"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script src="src/config.js"></script>
  <script src="src/js/ui.js"></script>
  <script src="src/js/registry.js"></script>
  <script src="src/js/session.js"></script>
  <script src="src/js/scanner.js"></script>
  <script src="src/js/collage.js"></script>
  <script src="src/js/audio.js"></script>
  <script src="src/js/export.js"></script>
  <script src="src/js/admin.js"></script>
  <script src="src/js/main.js"></script>
</body>

</html>
